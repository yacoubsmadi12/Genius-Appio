name: ai_story_gen
description: An AI-powered story generation application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.1
  cloud_firestore: ^4.13.5
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_generative_ai: ^0.2.1 # For AI story generation
  share_plus: ^7.2.1 # For sharing stories

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
